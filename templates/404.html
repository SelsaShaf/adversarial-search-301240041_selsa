<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
</head>
<body>

    <header class="navbar">
        <div class="navbar-brand">
            <span class="brand-icon">&#9671;</span>
            <span class="brand-title">Checkers AI</span>
        </div>
        <nav class="navbar-menu">
            <a href="/" class="nav-link">Game</a>
            <a href="/about" class="nav-link">About</a>
        </nav>
        <div class="navbar-actions">
            <button id="themeToggle" class="btn-icon" title="Toggle Theme">
                <span id="themeIcon">&#9790;</span>
            </button>
        </div>
    </header>

    <main class="error-container">
        <div class="error-content">
            <div class="error-board">
                <div class="error-piece red"></div>
                <div class="error-piece white"></div>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Halaman Tidak Ditemukan</h2>
            <p class="error-message">
                Seperti langkah yang tidak valid dalam Checkers,
                halaman yang kamu cari tidak ada.
            </p>
            <a href="/" class="btn-primary">Kembali ke Game</a>
        </div>
    </main>

    <footer class="footer">
        <p>Adversarial Search - Kecerdasan Buatan | Universitas Bale Bandung</p>
    </footer>

    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
</body>
</html>
